LoadModule ssl_module modules/mod_ssl.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

Listen 443

<VirtualHost *:443>
    SSLEngine on
    SSLCertificateFile "/certs/MerakiAPI-Cert.pem"
    SSLCertificateKeyFile "/certs/MerakiAPI-key.pem"

    ProxyPreserveHost On

    # ── SSE: nessun buffering per il log stream ──────────────
    <Location "/api/log-stream">
        ProxyPass        http://meraki-api:5000/api/log-stream
        ProxyPassReverse http://meraki-api:5000/api/log-stream
        SetEnv proxy-nokeepalive 0
        SetEnv proxy-sendchunked 1
        SetEnv force-proxy-request-1.0 0
        Header set Cache-Control "no-cache"
        Header set Connection "keep-alive"
    </Location>
    # ─────────────────────────────────────────────────────────

    ProxyPass / http://meraki-api:5000/
    ProxyPassReverse / http://meraki-api:5000/

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 common
</VirtualHost>
